name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
      - name: E2E (same-browser UI)
        run: npx playwright test --project=same-browser-ui
      - name: E2E (cross-browser WebRTC) [best-effort]
        # Nostr relays used for signaling are often blocked / rate-limited from
        # GitHub-hosted runners, so this job is informational only.
        continue-on-error: true
        run: RUN_WEBRTC_TESTS=1 npx playwright test --project=cross-browser-webrtc
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
